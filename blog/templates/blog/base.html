<!-- don't forget to load static files to use them in your templates -->
{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>My Blog</title>
        <!-- put the link to bootstrap here and then your CSS files-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- add fonts from google fonts-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext">
        <link rel="stylesheet" href="{% static 'css/blog.css' %}">
        
    </head>
    <body>
        <header class="page-header">
          <div class="container">
              <h1><a href="/">My Blog</a></h1>
          </div>
        </header>
    <main class="container">
        <div class="row">
            <div class="col">
            <!-- the following is a block tag that  let's you insert html from another template-->
            {% block content %}
            {% endblock %}
            </div>
        </div>
    </main>
</body>

</html>
